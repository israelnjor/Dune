<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dune - Smart academic repository login">
  <title>Dune Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <h1>Dune 📚</h1>
    <p>Welcome! Please login to access past papers and AI practice.</p>

<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required />
  <input type="password" id="password" placeholder="Password" required />
  <button type="submit">Login</button>
  <div id="messageBox"></div>
</form>

    <p class="signup">Don't have an account? <a href="register.html">Sign Up</a></p>
  </div>

  <script src="login.js"></script>
</body>
</html>
