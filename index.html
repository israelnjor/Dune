<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dune - Smart academic repository for past questions and AI-powered practice">
  
  <title>Dune Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Dune</h1>
    <input type="text" id="search" placeholder="Search by title or subject...">
  </header>
  <button id="themeToggle">🌙 Dark Mode</button>

  <label for="levelFilter">Level:</label>
   <select id="levelFilter">
      <option value="">All Levels</option>
      <option value="100">100</option>
      <option value="200">200</option>
   </select>

   <label for="categoryFilter">Category:</label>
   <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="Past Questions">Past Questions</option>
      <option value="IAs">IAs</option>
   </select>

<label for="yearFilter">Year:</label>
<select id="yearFilter">
  <option value="">All Years</option>
  <option value="2023">2023</option>
  <option value="2024">2024</option>
</select>
  </section>

  <section id="papersContainer"></section>

  <script src="app.js"></script>
</body>
</html>
